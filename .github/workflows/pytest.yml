name: pytest

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "codex_openai_server/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".pre-commit-config.yaml"
      - "Dockerfile"
      - "docker-compose.yaml"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
      - "codex_openai_server/**"
      - "tests/**"
      - "pyproject.toml"
      - "README.md"
      - ".pre-commit-config.yaml"
      - "Dockerfile"
      - "docker-compose.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: pre-commit/action@v3.0.1

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -q

  base-install:
    name: base-install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package only
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Import package
        run: python -c "import codex_openai_server; print(codex_openai_server.__doc__)"

  ci:
    name: ci
    if: always()
    needs: [lint, test, base-install]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.base-install.result }}" != "success" ]; then
            echo "One or more required jobs failed: lint=${{ needs.lint.result }} test=${{ needs.test.result }} base-install=${{ needs.base-install.result }}"
            exit 1
          fi
          echo "All required jobs succeeded."
