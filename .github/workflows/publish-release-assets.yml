name: publish release assets

on:
  pull_request:
    paths:
      - pyproject.toml
      - README.md
      - CHANGELOG.md
      - codex_openai_server/**
      - .github/workflows/publish-release-assets.yml
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semver tag to build and attach to a GitHub Release, for example v0.1.0.
        required: true
        type: string
  push:
    tags:
      - v*.*.*

permissions: {}

concurrency:
  group: github-release-assets-${{ inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      release-tag: ${{ steps.release_meta.outputs.raw }}
      normalized-version: ${{ steps.release_meta.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          project_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"

          raw_tag=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            raw_tag="${{ inputs.release_tag }}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [ -n "$raw_tag" ]; then
            if [[ ! "$raw_tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              echo "Release tag must be semver-compatible (for example v0.1.0 or v0.1.0-rc.1)."
              exit 1
            fi

            normalized="${raw_tag#v}"
            if [ "$normalized" != "$project_version" ]; then
              echo "Release tag ($normalized) must match pyproject.toml version ($project_version)."
              exit 1
            fi
          fi

          {
            echo "raw=${raw_tag}"
            echo "version=${project_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum -- * > SHA256SUMS
          )

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: github-release-assets
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  verify-python-310-distributions:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions on Python 3.14
        run: python -m build

      - name: Validate Python 3.10 distribution metadata
        run: python -m twine check --strict dist/*

  publish-release:
    if: github.event_name != 'pull_request'
    needs: [build-distributions]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          name: github-release-assets
          path: dist/

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build-distributions.outputs.release-tag }}
          RELEASE_VERSION: ${{ needs.build-distributions.outputs.normalized-version }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; uploading refreshed assets."
          else
            gh release create "$RELEASE_TAG" \
              --repo "$GH_REPO" \
              --draft \
              --verify-tag \
              --title "codex_openai_server v${RELEASE_VERSION}" \
              --generate-notes
          fi

          gh release upload "$RELEASE_TAG" dist/* --repo "$GH_REPO" --clobber
