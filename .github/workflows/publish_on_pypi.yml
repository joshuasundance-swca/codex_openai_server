name: publish pypi

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semver tag to build from manually, for example 0.1.0 or v0.1.0.
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: publish-release-${{ inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      release-tag: ${{ steps.release_meta.outputs.raw }}
      normalized-version: ${{ steps.release_meta.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Resolve release metadata
        id: release_meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        shell: bash
        run: |
          set -euo pipefail

          project_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"

          raw_tag=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            raw_tag="${INPUT_RELEASE_TAG}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [ -n "$raw_tag" ]; then
            if [[ ! "$raw_tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
              echo "Release tag must be semver-compatible (for example 0.1.0 or v0.1.0)."
              exit 1
            fi

            normalized="${raw_tag#v}"
            if [ "$normalized" != "$project_version" ]; then
              echo "Release tag ($normalized) must match pyproject.toml version ($project_version)."
              exit 1
            fi
          fi

          {
            echo "raw=${raw_tag}"
            echo "version=${project_version}"
          } >> "$GITHUB_OUTPUT"

      - name: Require CHANGELOG entry for release
        if: steps.release_meta.outputs.raw != ''
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          header="## [${RELEASE_VERSION}]"
          if ! grep -F -- "$header" CHANGELOG.md > /dev/null; then
            echo "::error file=CHANGELOG.md::Missing release header '${header}' in CHANGELOG.md."
            exit 1
          fi

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    if: github.event_name != 'pull_request' && needs.build-distributions.outputs.release-tag != ''
    needs: [build-distributions]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: release
      url: https://pypi.org/project/codex-openai-server/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
