name: bumpver

on:
  workflow_dispatch:
    inputs:
      release:
        description: Which semver component to bump.
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bumpver:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install bumpver pre-commit

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run bumpver
        run: |
          bumpver update --${{ inputs.release }}
