name: publish docker

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing semver tag to build from manually, for example v0.1.0.
        required: true
        type: string
  push:
    tags:
      - "v*.*.*"

permissions: {}

concurrency:
  group: publish-docker-${{ inputs.release_tag || github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
          ref: ${{ inputs.release_tag || github.ref }}

      - name: Resolve release metadata
        id: release_meta
        env:
          INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        shell: bash
        run: |
          set -euo pipefail

          project_version="$(python -c 'import pathlib, tomllib; print(tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])')"

          raw_tag=""
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            raw_tag="${INPUT_RELEASE_TAG}"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$raw_tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tag must be semver-compatible (for example v0.1.0)."
            exit 1
          fi

          normalized="${raw_tag#v}"
          if [ "$normalized" != "$project_version" ]; then
            echo "Release tag ($normalized) must match pyproject.toml version ($project_version)."
            exit 1
          fi

          {
            echo "raw=${raw_tag}"
            echo "version=${normalized}"
            echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER}/codex_openai_server"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.release_meta.outputs.image }}
          tags: |
            type=raw,value=${{ steps.release_meta.outputs.raw }}
            type=raw,value=${{ steps.release_meta.outputs.version }}
            type=raw,value=latest

      - name: Build smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: codex-openai-server-smoke:${{ steps.release_meta.outputs.version }}

      - name: Smoke test image
        run: |
          docker run --rm --entrypoint python codex-openai-server-smoke:${{ steps.release_meta.outputs.version }} -c "import codex_openai_server; print(codex_openai_server.__version__)"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
